<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Explorer</title>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>

<header class="hero">
  <video autoplay muted loop class="hero-video">
    <source src="https://www.pexels.com/download/video/12721720/" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content fade-in">
    <h1>Explore the Universe</h1>
    <p>Discover planets, galaxies, and beyond</p>

    <div class="hero-buttons">
      <button class="btn primary">Get Started</button>
      <button class="btn secondary">Learn More</button>
    </div>
  </div>
</header>

<section class="features">
  <div class="card">Mercury</div>
  <div class="card">Venus</div>
  <div class="card">Earth</div>
  <div class="card">Mars</div>
</section>

<footer>
  <p>© 2026 Planet Explorer</p>
</footer>

</body>
</html>
