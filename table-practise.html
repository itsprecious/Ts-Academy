<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
        }
    </style>
<body>
    <table>
        <caption>Table Practice</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Occupation</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Precious Paul</td>
                <td>28</td>
                <td>Frontend Developer</td>
            </tr>
            <tr>
                <td>Deliah Paul</td>
                <td>25</td>
                <td>Backend Developer</td>
            </tr>
            <tr>
                <td>Pauline Paul</td>
                <td>30</td>
                <td>Cyber Security Analyst</td>
            </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="3">End of Table</td>
        </tr>
    </tfoot>
    </table>
</body>
</head>
</html>
